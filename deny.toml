# cargo-deny configuration for ono-sendai
# Block GPL / AGPL / CC-BY-NC and similar copyleft / non-commercial licenses
# that would compromise our MIT distribution promise.

[graph]
all-features = false

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[[licenses.exceptions]]
# ring's license is a non-SPDX combination but is widely accepted in MIT projects
name = "ring"
allow = ["MIT", "ISC", "OpenSSL"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[advisories]
yanked = "warn"
# paste (RUSTSEC-2024-0436) is unmaintained but reaches us only through
# ratatui. Track upstream and switch when ratatui drops it.
ignore = ["RUSTSEC-2024-0436"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
